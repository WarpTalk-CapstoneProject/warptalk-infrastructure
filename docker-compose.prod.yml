# ====================================================================
# WarpTalk — Production Overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ====================================================================

services:
  postgres:
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  pgbouncer:
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  auth-service:
    restart: always
    ports:
      - "5101:5101"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  meeting-service:
    restart: always
    ports:
      - "5102:5102"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 1G
          cpus: "1.5"

  transcript-service:
    restart: always
    ports:
      - "5103:5103"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  notification-service:
    restart: always
    ports:
      - "5104:5104"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  gateway:
    restart: always
    ports:
      - "5200:5200"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

  coturn-primary:
    restart: always
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"

  coturn-backup:
    restart: always
    ports:
      - "3479:3478/udp"
      - "3479:3478/tcp"

  seq:
    restart: always
    ports:
      - "5341:80"

  prometheus:
    restart: always

  grafana:
    restart: always
    ports:
      - "3001:3000"
