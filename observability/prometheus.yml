# ====================================================================
# Prometheus Configuration for WarpTalk
# Scrapes metrics from all .NET services
# ====================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'gateway'
    metrics_path: /metrics
    static_configs:
      - targets: ['gateway:5200']
        labels:
          service: gateway

  - job_name: 'auth-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['auth-service:5101']
        labels:
          service: auth

  - job_name: 'meeting-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['meeting-service:5102']
        labels:
          service: meeting

  - job_name: 'transcript-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['transcript-service:5103']
        labels:
          service: transcript

  - job_name: 'notification-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['notification-service:5104']
        labels:
          service: notification

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
        labels:
          service: redis

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
        labels:
          service: postgres
