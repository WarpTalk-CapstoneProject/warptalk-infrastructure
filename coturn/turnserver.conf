# ====================================================================
# COTURN Configuration for WarpTalk
# TURN/STUN server for WebRTC audio relay
# ====================================================================

# Network
listening-port=3478
tls-listening-port=5349

# Use fingerprints in TURN messages
fingerprint

# Use long-term credential mechanism
lt-cred-mech

# Realm
realm=warptalk.vn

# Static auth secret (shared with application)
use-auth-secret
static-auth-secret=turn_secret

# Logging
log-file=/var/log/turnserver.log
verbose

# Relay threads (auto = CPU count)
relay-threads=0

# Disable TCP relay (UDP only for media)
no-tcp-relay

# Denied peer IPs (security — no relay to private networks)
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255

# Rate limiting
total-quota=100
bps-capacity=0
stale-nonce=600

# Media ports range
min-port=49152
max-port=65535

# No multicast peers
no-multicast-peers

# Process (run in foreground for Docker)
no-cli
